@if (favStore.count() === 0) {
  <div class="empty-state">
    <p>No favorites yet.</p>
    <p>Go to <a routerLink="/">Photos</a> and click a photo to add it here.</p>
  </div>
} @else {
  <app-photo-grid>
    @for (photo of favStore.favorites(); track photo.id) {
      @defer (on viewport) {
        <app-photo-card
          [photo]="photo"
          [isFavorite]="true"
          (cardClicked)="openPhoto($event)"
        />
      } @placeholder {
        <div class="photo-skeleton"></div>
      }
    }
  </app-photo-grid>
}
