@if (loading()) {
  <app-loader />
} @else if (photo()) {
  <div class="detail-wrap">
    <div class="top-bar">
      <button mat-button (click)="goBack()"><mat-icon>arrow_back</mat-icon> Back</button>
    </div>
    <div class="photo-preview" [style.background-image]="'url(' + photo()!.url + ')'"></div>
    @if (!fullImageError()) {
      <img
        class="full-photo"
        [src]="photo()!.fullUrl"
        [alt]="'Photo by ' + photo()!.author"
        fetchpriority="high"
        [class.ready]="fullImageReady()"
        (load)="fullImageReady.set(true)"
        (error)="fullImageError.set(true)"
      />
    } @else {
      <p class="image-load-error">Could not load full image.</p>
    }
    <div class="actions">
      <p class="author">Photo by {{ photo()!.author }}</p>
      @if (isFavorite()) {
        <button mat-raised-button color="warn" (click)="removeFromFavorites()">
          Remove from favorites
        </button>
      } @else {
        <button mat-raised-button color="primary" (click)="addToFavorites()">
          Add to favorites
        </button>
      }
    </div>
  </div>
} @else if (error()) {
  <p class="not-found">Failed to load photo.</p>
} @else {
  <p class="not-found">Photo not found.</p>
}
