<mat-toolbar color="primary">
  <span class="logo">Photo Library</span>
  <nav>
    <a mat-button routerLink="/" [class.nav-active]="isPhotosActive()">
      Photos
    </a>
    @let count = favStore.count();
    <a
      mat-button
      routerLink="/favorites"
      routerLinkActive="nav-active"
      [matBadge]="count"
      [matBadgeHidden]="count === 0"
      matBadgeColor="warn"
    >
      Favorites
    </a>
  </nav>
</mat-toolbar>
